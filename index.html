<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectADERMA - Plataforma Sanitaria Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #fafafa;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px 20px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 600;
            color: #1f7f7f;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 40px;
        }

        .divider {
            width: 40px;
            height: 2px;
            background-color: #e0e0e0;
            margin: 0 auto 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .description {
            color: #666;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .status {
            background-color: #f5f5f5;
            border-left: 3px solid #1f7f7f;
            padding: 16px;
            margin-bottom: 40px;
            text-align: left;
            border-radius: 4px;
        }

        .status-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #999;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .status-text {
            font-size: 13px;
            color: #555;
            font-weight: 500;
        }

        .contact-section {
            border-top: 1px solid #e8e8e8;
            padding-top: 30px;
            margin-top: 30px;
        }

        .contact-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #999;
            letter-spacing: 0.8px;
            margin-bottom: 12px;
        }

        .contact-info {
            font-size: 14px;
            color: #1f7f7f;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-info:hover {
            color: #166666;
            text-decoration: underline;
        }

        .footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #e8e8e8;
            font-size: 11px;
            color: #bbb;
        }

        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 30px 20px;
            }

            h1 {
                font-size: 20px;
            }

            .logo {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ConectADERMA</div>
        <div class="subtitle">Proyecto en desarrollo</div>

        <div class="divider"></div>

        <h1>Plataforma Sanitaria Digital</h1>

        <p class="description">
            ConectADERMA es una plataforma sanitaria digital en fase de validación interna, sin operaciones abiertas al público general en este momento.
        </p>
    </div>
</body>
</html>
